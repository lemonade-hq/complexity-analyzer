name: PR Complexity Backfill

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      days:
        description: 'Number of days to look back (including today). Default 2 covers yesterday + today.'
        required: false
        default: '2'

jobs:
  backfill:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Complexity App token
        id: complexity-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.COMPLEXITY_APP_CLIENT_ID }}
          private-key: ${{ secrets.COMPLEXITY_APP_PRIVATE_KEY }}
          owner: lemonade-hq
          permission-contents: read
          permission-issues: write
          permission-pull-requests: read

      - name: Verify org-wide App access
        env:
          GH_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
        run: |
          installation="$(gh api /installation)"
          app_slug="$(jq -r '.app_slug' <<< "$installation")"
          repository_selection="$(jq -r '.repository_selection' <<< "$installation")"

          if [ "$app_slug" != "lemonade-complexity-analyzer" ]; then
            echo "Expected lemonade-complexity-analyzer, got $app_slug"
            exit 1
          fi
          if [ "$repository_selection" != "all" ]; then
            echo "GitHub App must be installed on all repositories; got $repository_selection"
            exit 1
          fi

          # Fail before analysis if the token cannot read PRs outside this repository.
          gh api "repos/lemonade-hq/lemonade/pulls?state=all&per_page=1" >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Compute date range
        id: dates
        env:
          DAYS_INPUT: ${{ inputs.days || '2' }}
        run: |
          DAYS="$DAYS_INPUT"
          UNTIL="$(date -u +%Y-%m-%d)"
          SINCE="$(date -u -d "$((DAYS - 1)) days ago" +%Y-%m-%d)"
          echo "since=$SINCE" >> "$GITHUB_OUTPUT"
          echo "until=$UNTIL" >> "$GITHUB_OUTPUT"
          echo "Backfilling $SINCE..$UNTIL"

      - name: Backfill open PRs
        env:
          GITHUB_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE: ${{ steps.dates.outputs.since }}
          UNTIL: ${{ steps.dates.outputs.until }}
        run: |
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state open \
            --since $SINCE \
            --until $UNTIL \
            --label \
            --workers 5

      - name: Backfill closed PRs
        env:
          GITHUB_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE: ${{ steps.dates.outputs.since }}
          UNTIL: ${{ steps.dates.outputs.until }}
        run: |
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state closed \
            --since $SINCE \
            --until $UNTIL \
            --label \
            --workers 5
