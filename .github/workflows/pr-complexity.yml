name: PR Complexity Analysis

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Start date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false
      until:
        description: 'End date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false
      state:
        description: 'PR state to process: both, open, or closed'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - open
          - closed

jobs:
  label-prs:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Label open PRs (skip already-labeled)
        if: ${{ inputs.state == 'both' || inputs.state == 'open' || github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE_INPUT: ${{ inputs.since }}
          UNTIL_INPUT: ${{ inputs.until }}
        run: |
          if [ -n "$SINCE_INPUT" ] && [ -n "$UNTIL_INPUT" ]; then
            DATE_ARGS="--since $SINCE_INPUT --until $UNTIL_INPUT"
          else
            DATE_ARGS="--since-minutes 120"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state open \
            $DATE_ARGS \
            --label \
            --workers 5

      - name: Label closed PRs (re-label)
        if: ${{ inputs.state == 'both' || inputs.state == 'closed' || github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE_INPUT: ${{ inputs.since }}
          UNTIL_INPUT: ${{ inputs.until }}
        run: |
          if [ -n "$SINCE_INPUT" ] && [ -n "$UNTIL_INPUT" ]; then
            DATE_ARGS="--since $SINCE_INPUT --until $UNTIL_INPUT"
          else
            DATE_ARGS="--since-minutes 120"
          fi
          FORCE_FLAG=""
          if [ -z "$SINCE_INPUT" ]; then
            FORCE_FLAG="--force"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state closed \
            $DATE_ARGS \
            --label \
            $FORCE_FLAG \
            --workers 5
