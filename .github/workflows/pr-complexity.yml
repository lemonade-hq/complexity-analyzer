name: PR Complexity Analysis

on:
  pull_request:
    types: [opened, closed]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Analyze and label PR
        id: complexity
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          complexity-cli label-pr "${{ github.event.pull_request.html_url }}"

      - name: Find existing comment
        uses: peter-evans/find-comment@v2
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          comment-author: 'github-actions[bot]'
          body-includes: <!-- complexity-analyzer-report -->

      - name: Create or update comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            <!-- complexity-analyzer-report -->
            # 📊 PR Complexity Analysis

            **Complexity Score:** ${{ steps.complexity.outputs.score }}/10

            **Explanation:**
            ${{ steps.complexity.outputs.explanation }}

            ---
            *Analyzed by Complexity Analyzer*
          edit-mode: replace
