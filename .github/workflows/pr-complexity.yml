name: PR Complexity Analysis

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  label-prs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Label open PRs (skip already-labeled)
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state open \
            --since-minutes 20 \
            --label \
            --workers 5

      - name: Label closed PRs (re-label)
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state closed \
            --since-minutes 20 \
            --label \
            --force \
            --workers 5
