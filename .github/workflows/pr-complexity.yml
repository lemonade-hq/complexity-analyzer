name: PR Complexity Analysis

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Start date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false
      until:
        description: 'End date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false
      state:
        description: 'PR state to process: both, open, or closed'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - open
          - closed

jobs:
  label-prs:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Complexity App token
        id: complexity-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.COMPLEXITY_APP_CLIENT_ID }}
          private-key: ${{ secrets.COMPLEXITY_APP_PRIVATE_KEY }}
          owner: lemonade-hq
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Verify org-wide App access
        env:
          GH_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
          APP_SLUG: ${{ steps.complexity-app-token.outputs.app-slug }}
          INSTALLATION_ID: ${{ steps.complexity-app-token.outputs.installation-id }}
          EXPECTED_INSTALLATION_ID: ${{ vars.COMPLEXITY_APP_INSTALLATION_ID }}
        run: |
          if [ "$APP_SLUG" != "lemonade-complexity-analyzer" ]; then
            echo "Expected lemonade-complexity-analyzer, got $APP_SLUG"
            exit 1
          fi
          if [ "$INSTALLATION_ID" != "$EXPECTED_INSTALLATION_ID" ]; then
            echo "Expected installation $EXPECTED_INSTALLATION_ID, got $INSTALLATION_ID"
            exit 1
          fi

          # Validate effective access, not just the installation's configured selection.
          repository_count="$(gh api /installation/repositories --jq '.total_count')"
          if [ "$repository_count" -le 1 ]; then
            echo "Expected org-wide repository access, got $repository_count repository"
            exit 1
          fi
          gh api "repos/lemonade-hq/lemonade/pulls?state=all&per_page=1" >/dev/null

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Label open PRs (skip already-labeled)
        if: ${{ inputs.state == 'both' || inputs.state == 'open' || github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE_INPUT: ${{ inputs.since }}
          UNTIL_INPUT: ${{ inputs.until }}
        run: |
          if [ -n "$SINCE_INPUT" ] && [ -n "$UNTIL_INPUT" ]; then
            DATE_ARGS="--since $SINCE_INPUT --until $UNTIL_INPUT"
          else
            DATE_ARGS="--since-minutes 120"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state open \
            $DATE_ARGS \
            --label \
            --workers 5

      - name: Label closed PRs (re-label)
        if: ${{ inputs.state == 'both' || inputs.state == 'closed' || github.event_name == 'schedule' }}
        env:
          GITHUB_TOKEN: ${{ steps.complexity-app-token.outputs.token }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SINCE_INPUT: ${{ inputs.since }}
          UNTIL_INPUT: ${{ inputs.until }}
        run: |
          if [ -n "$SINCE_INPUT" ] && [ -n "$UNTIL_INPUT" ]; then
            DATE_ARGS="--since $SINCE_INPUT --until $UNTIL_INPUT"
          else
            DATE_ARGS="--since-minutes 120"
          fi
          FORCE_FLAG=""
          if [ -z "$SINCE_INPUT" ]; then
            FORCE_FLAG="--force"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state closed \
            $DATE_ARGS \
            --label \
            $FORCE_FLAG \
            --workers 5
