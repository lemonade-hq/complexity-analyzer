name: PR Complexity Analysis

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      since:
        description: 'Start date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false
      until:
        description: 'End date (YYYY-MM-DD) for backfill. If empty, uses --since-minutes.'
        required: false

jobs:
  label-prs:
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -e .

      - name: Label open PRs (skip already-labeled)
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${{ inputs.since }}" ] && [ -n "${{ inputs.until }}" ]; then
            DATE_ARGS="--since ${{ inputs.since }} --until ${{ inputs.until }}"
          else
            DATE_ARGS="--since-minutes 40"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state open \
            $DATE_ARGS \
            --label \
            --workers 5

      - name: Label closed PRs (re-label)
        env:
          GITHUB_TOKEN: ${{ secrets.ORG_GITHUB_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "${{ inputs.since }}" ] && [ -n "${{ inputs.until }}" ]; then
            DATE_ARGS="--since ${{ inputs.since }} --until ${{ inputs.until }}"
          else
            DATE_ARGS="--since-minutes 40"
          fi
          FORCE_FLAG=""
          if [ -z "${{ inputs.since }}" ]; then
            FORCE_FLAG="--force"
          fi
          complexity-cli batch-analyze \
            --org lemonade-hq \
            --state closed \
            $DATE_ARGS \
            --label \
            $FORCE_FLAG \
            --workers 5
